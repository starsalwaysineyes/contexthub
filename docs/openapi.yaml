openapi: 3.1.0
info:
  title: ContextHub API
  version: 0.3.0
  description: Agent-native context backend API.
servers:
  - url: http://127.0.0.1:4040
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
  schemas:
    Tenant:
      type: object
      additionalProperties: true
      required: [id, slug, name, createdAt]
      properties:
        id:
          type: string
        slug:
          type: string
        name:
          type: string
        description:
          type: string
        createdAt:
          type: string
          format: date-time
    RecordLayer:
      type: string
      enum: [l0, l1, l2]
    CreateTenantRequest:
      type: object
      required: [slug, name]
      properties:
        slug:
          type: string
        name:
          type: string
        description:
          type: string
    CreatePartitionRequest:
      type: object
      required: [tenantId, key, name]
      properties:
        tenantId:
          type: string
        key:
          type: string
        name:
          type: string
        kind:
          type: string
        description:
          type: string
        allowCrossQueryFrom:
          type: array
          items:
            type: string
    RegisterAgentRequest:
      type: object
      required: [tenantId, name]
      properties:
        tenantId:
          type: string
        name:
          type: string
        kind:
          type: string
        metadata:
          type: object
          additionalProperties: true
    CreatePrincipalRequest:
      type: object
      required: [tenantId, name]
      properties:
        tenantId:
          type: string
        name:
          type: string
        kind:
          type: string
        metadata:
          type: object
          additionalProperties: true
    UpsertPrincipalAclRequest:
      type: object
      required: [partitionKey]
      properties:
        partitionKey:
          type: string
        canRead:
          type: boolean
        canWrite:
          type: boolean
        allowedLayers:
          type: array
          items:
            $ref: "#/components/schemas/RecordLayer"
    CreateRecordRequest:
      type: object
      required: [tenantId, partitionKey, type, title, text]
      properties:
        tenantId:
          type: string
        partitionKey:
          type: string
        type:
          type: string
        layer:
          $ref: "#/components/schemas/RecordLayer"
        title:
          type: string
        text:
          type: string
        manualSummary:
          type: string
        source:
          oneOf:
            - type: object
              additionalProperties: true
            - type: "null"
        tags:
          type: array
          items:
            type: string
        metadata:
          type: object
          additionalProperties: true
        importance:
          type: number
          minimum: 0
          maximum: 5
        pinned:
          type: boolean
        idempotencyKey:
          type: string
    QueryRequest:
      type: object
      required: [tenantId, query]
      properties:
        tenantId:
          type: string
        query:
          type: string
        partitions:
          type: array
          items:
            type: string
        types:
          type: array
          items:
            type: string
        layers:
          type: array
          items:
            $ref: "#/components/schemas/RecordLayer"
        limit:
          type: integer
        rerank:
          type: boolean
    QueryResponse:
      type: object
      properties:
        items:
          type: array
          items:
            type: object
            additionalProperties: true
        retrieval:
          type: object
          additionalProperties: true
    CommitSessionRequest:
      type: object
      required: [tenantId, partitionKey]
      properties:
        tenantId:
          type: string
        partitionKey:
          type: string
        agentId:
          type: string
        sessionId:
          type: string
        summary:
          type: string
        metadata:
          type: object
          additionalProperties: true
        messages:
          type: array
          items:
            type: object
            additionalProperties: true
        memoryEntries:
          type: array
          items:
            type: object
            additionalProperties: true
paths:
  /health:
    get:
      summary: Service health and provider readiness
      responses:
        "200":
          description: OK
  /v1/auth/me:
    get:
      security:
        - bearerAuth: []
      summary: Return current auth identity
      responses:
        "200":
          description: OK
  /v1/tenants:
    post:
      security:
        - bearerAuth: []
      summary: Create or return a tenant by slug
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTenantRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
  /v1/partitions:
    post:
      security:
        - bearerAuth: []
      summary: Create or return a partition
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePartitionRequest"
      responses:
        "201":
          description: Created
  /v1/agents:
    post:
      security:
        - bearerAuth: []
      summary: Register an agent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterAgentRequest"
      responses:
        "201":
          description: Created
  /v1/principals:
    post:
      security:
        - bearerAuth: []
      summary: Create a principal and return its token once
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePrincipalRequest"
      responses:
        "201":
          description: Created
  /v1/principals/{principalId}/acl:
    post:
      security:
        - bearerAuth: []
      summary: Create or update partition ACL for a principal
      parameters:
        - name: principalId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertPrincipalAclRequest"
      responses:
        "201":
          description: Created
  /v1/records:
    post:
      security:
        - bearerAuth: []
      summary: Write a curated record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRecordRequest"
      responses:
        "201":
          description: Created
  /v1/query:
    post:
      security:
        - bearerAuth: []
      summary: Query records with optional rerank
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QueryRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryResponse"
  /v1/sessions/commit:
    post:
      security:
        - bearerAuth: []
      summary: Commit a session and optional memory entries
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommitSessionRequest"
      responses:
        "201":
          description: Created
